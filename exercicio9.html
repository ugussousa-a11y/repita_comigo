<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercicio 9</title>
</head>
<body>
    <script>
       // 1. Definimos o primeiro número inteiro maior que 100
let numero = 101;

// 2. Criamos um contador para garantir que imprimiremos apenas 10 números
let contador = 1;

// 3. O loop rodará enquanto o contador for menor ou igual a 10
while (contador <= 10) {
    
    // 4. Imprimimos o número atual
    document.write("Número " + contador + ": " + numero + "<br>");
    
    // 5. Incrementamos o número para o próximo (101 -> 102 -> 103...)
    numero++;
    
    // 6. Incrementamos o contador para controlar as 10 repetições
    contador++;
} 
    </script>
</body>
</html>
