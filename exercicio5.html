<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercicio 5</title>
</head>
<body>
    <h1>media de dois numeros</h1>
    <script>
        let n1 = parseInt(prompt("Digite um número inteiro:"));
        let n2 = parseInt(prompt("Digite outro número inteiro:")); 
        let media = (n1 + n2) / 2;
        alert("A média dos números " + n1 + " e " + n2 + " é: " + media);
        document.write("A média dos números " + n1 + " e " + n2 + " é: " + media); 
    </script>
</body>
</html>
